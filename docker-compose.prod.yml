name: diet-coach-prod

services:
  backend:
    container_name: diet-coach-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      # ── App ────────────────────────────────────────────────
      APP_NAME: ${APP_NAME:-Diet Coach Agent}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}

      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      BACKEND_INTERNAL_PORT: ${BACKEND_INTERNAL_PORT:-8000}

      # ── Security ───────────────────────────────────────────
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}

      # ── Database / Persistent paths ────────────────────────
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/persistent/app.db}
      PERSISTENT_DIR: /app/persistent
      STORAGE_DIR: /app/persistent/storage
      UPLOAD_DIR: /app/persistent/uploads
      AUDIO_STORAGE_DIR: /app/persistent/audio
      UPLOAD_STORAGE_PATH: /app/persistent/uploads
      AUDIO_STORAGE_PATH: /app/persistent/audio

      # ── CORS ───────────────────────────────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS:-https://testcaloria.digent24.com,https://caloria.digent24.com,https://testcaloriaapi.digent24.com,https://caloriaapi.digent24.com}

      # ── Development OTP ────────────────────────────────────
      DEV_OTP_CODE: ${DEV_OTP_CODE:-123456}
      DEFAULT_OTP_CODE: ${DEFAULT_OTP_CODE:-123456}
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-5}

      # ── Providers ──────────────────────────────────────────
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      STT_PROVIDER: ${STT_PROVIDER:-none}
      IMAGE_ANALYSIS_PROVIDER: ${IMAGE_ANALYSIS_PROVIDER:-none}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}

      # ── OpenAI Provider ────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_REQUIRE_PROXY: ${OPENAI_REQUIRE_PROXY:-false}
      OPENAI_PROXY_URL: ${OPENAI_PROXY_URL:-}
      OPENAI_PROXY_user: ${OPENAI_PROXY_user:-}
      OPENAI_PROXY_pass: ${OPENAI_PROXY_pass:-}
      OPENAI_PROXY_USER: ${OPENAI_PROXY_USER:-}
      OPENAI_PROXY_PASS: ${OPENAI_PROXY_PASS:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}

      # ── OpenClaw AI Provider ───────────────────────────────
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL:-openclaw/main}
      OPENCLAW_CHAT_COMPLETIONS_PATH: ${OPENCLAW_CHAT_COMPLETIONS_PATH:-/v1/chat/completions}
      OPENCLAW_TIMEOUT_SECONDS: ${OPENCLAW_TIMEOUT_SECONDS:-120}
      OPENCLAW_MAX_RETRIES: ${OPENCLAW_MAX_RETRIES:-2}
      OPENCLAW_TEMPERATURE: ${OPENCLAW_TEMPERATURE:-0.3}
      OPENCLAW_MAX_TOKENS: ${OPENCLAW_MAX_TOKENS:-2048}
      OPENCLAW_CONTEXT_MAX_MESSAGES: ${OPENCLAW_CONTEXT_MAX_MESSAGES:-24}
      OPENCLAW_CONTEXT_SUMMARY_ENABLED: ${OPENCLAW_CONTEXT_SUMMARY_ENABLED:-true}
    ports:
      - "${BACKEND_BIND_IP:-0.0.0.0}:${BACKEND_PORT:-9002}:8000"
    volumes:
      - ./backend/persistent/prod:/app/persistent
#    command: >
#       sh -c "cd /app && python -m alembic upgrade head"
    networks:
      - diet-coach-prod-net

  frontend:
    container_name: diet-coach-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:9002}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:9002}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:9002}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:9002}
      INTERNAL_API_BASE_URL: http://backend:8000
      PERSISTENT_DIR: /app/persistent
    ports:
      - "${FRONTEND_BIND_IP:-0.0.0.0}:${FRONTEND_PORT:-9001}:3000"
    volumes:
      - ./frontend/persistent/prod:/app/persistent
    networks:
      - diet-coach-prod-net

networks:
  diet-coach-prod-net:
    name: diet-coach-prod-net
